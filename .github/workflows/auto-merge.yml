name: Enable Dependabot Auto-Merge

on: pull_request

jobs:
  dependabot:
    uses: Staffbase/gha-workflows/.github/workflows/template_automerge_dependabot.yml@v15.1.1
    secrets:
      client_id: ${{ vars.STAFFBASE_ACTIONS_CLIENT_ID }}
      private_key: ${{ secrets.STAFFBASE_ACTIONS_PRIVATE_KEY }}
